<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | PawBuddy</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .login-body {
      background-color: #f0f7ff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }

    .login-bg-decor {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 35vw;
      background-color: #e3f0fe;
      z-index: 0;
    }

    .left-decor {
      left: 0;
      border-radius: 0 40% 40% 0 / 0 50% 50% 0;
    }

    .right-decor {
      right: 0;
      border-radius: 40% 0 0 40% / 50% 0 0 50%;
    }

    .login-page-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      width: 100%;
    }

    .login-top-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .login-top-logo .logo-paw {
      font-size: 32px;
      color: #1a2b49;
    }

    .login-top-logo .logo-text-block {
      display: flex;
      flex-direction: column;
    }

    .login-top-logo .main-logo-text {
      font-size: 28px;
      font-weight: 800;
      color: #1a2b49;
      line-height: 1.1;
    }

    .login-top-logo .sub-logo-text {
      font-size: 13px;
      color: #4a5568;
      font-weight: 600;
    }

    .login-card {
      background-color: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 420px;
      padding: 48px;
      border: none;
    }

    .login-card h2 {
      font-size: 28px;
      text-align: center;
      font-weight: 800;
      color: #1a2b49;
      margin-bottom: 8px;
    }

    .login-card p.login-subtitle {
      text-align: center;
      color: #6b7280;
      margin-bottom: 36px;
      font-size: 14px;
    }

    .login-card .form-group {
      margin-bottom: 24px;
    }

    .login-card label {
      font-weight: 700;
      color: #1a2b49;
      margin-bottom: 8px;
      font-size: 13px;
      display: block;
    }

    .login-card .form-control {
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 14px;
      width: 100%;
    }

    .login-card .form-control:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
      outline: none;
    }

    .login-btn {
      background-color: #1a73e8;
      border-radius: 6px;
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      justify-content: center;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 8px;
      transition: background-color 0.2s;
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #9aa0a6;
      cursor: pointer;
    }

    .login-btn:hover {
      background-color: #1557b0;
    }

    .register-prompt {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #6b7280;
    }

    .register-prompt a {
      color: #1a73e8;
      font-weight: 600;
      text-decoration: none;
    }

    .login-dog {
      position: absolute;
      bottom: -40px;
      left: -20px;
      height: 45vh;
      z-index: 10;
    }

    .login-cat {
      position: absolute;
      bottom: -40px;
      right: -20px;
      height: 40vh;
      z-index: 10;
    }

    @media (max-width: 768px) {
      .login-card {
        padding: 24px;
        margin: 0 16px;
      }
      .login-bg-decor {
        display: none;
      }
      .login-page-wrapper {
        padding: 0 16px;
      }
    }
  </style>
  <meta name="view-transition" content="same-origin">
</head>

<body class="login-body">
  <div class="login-bg-decor left-decor"></div>
  <div class="login-bg-decor right-decor"></div>

  <div class="login-page-wrapper">
    <div class="login-top-logo">
      <div class="logo-text-block">
      </div>
    </div>

    <div class="login-card">
      <h2>Create Account</h2>
      <p class="login-subtitle">Join us to easily book and manage pet appointments.</p>

      <form id="registerForm">
        <div class="form-group">
          <label for="regName">Full Name</label>
          <input type="text" id="regName" class="form-control" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label for="regEmail">Email Address</label>
          <input type="email" id="regEmail" class="form-control" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="regPassword">Password</label>
          <div style="position: relative;">
            <input type="password" id="regPassword" class="form-control" placeholder="Create a password" required>
            <i class="far fa-eye-slash toggle-pw"></i>
          </div>
        </div>

        <button type="submit" class="btn-primary login-btn">Sign Up</button>

        <div style="display: flex; align-items: center; margin: 20px 0;">
          <hr style="flex-grow: 1; border: none; border-top: 1px solid #e2e8f0;">
          <span style="padding: 0 10px; color: #6b7280; font-size: 13px; font-weight: 600;">OR</span>
          <hr style="flex-grow: 1; border: none; border-top: 1px solid #e2e8f0;">
        </div>

        <button type="button" id="googleLoginBtn" class="btn-outline login-btn"
          style="background-color: white; color: #4a5568; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; gap: 10px;">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"
            style="width: 18px; height: 18px;">
          Sign up with Google
        </button>

        <div class="register-prompt">
          Already have an account? <a href="login.html">Login here</a>
        </div>
      </form>
    </div>
  </div>


  <script src="js/firebase.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBhrDKZV_BDbDy9hDmcU6_MneQKx8aiijE",
      authDomain: "petcare-e518d.firebaseapp.com",
      projectId: "petcare-e518d",
      storageBucket: "petcare-e518d.firebasestorage.app",
      messagingSenderId: "1024623908060",
      appId: "1:1024623908060:web:a294146194b01407991019",
      measurementId: "G-FLQHNL3EHT"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    document.addEventListener("DOMContentLoaded", () => {
      const registerForm = document.getElementById("registerForm");

      // Toggle Password Visibility
      const togglePw = document.querySelector('.toggle-pw');
      const passwordInput = document.getElementById('regPassword');
      if (togglePw && passwordInput) {
        togglePw.addEventListener('click', () => {
          const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordInput.setAttribute('type', type);
          togglePw.classList.toggle('fa-eye-slash');
          togglePw.classList.toggle('fa-eye');
        });
      }

      async function handleSuccessfulRegistration(user, name) {
        const email = user.email.toLowerCase();
        const role = (email === "admin@petcare.com") ? "admin" : "user"; // Newly registered users via this page are 'user' unless admin

        const userData = {
          id: user.uid,
          name: name || user.displayName || email.split('@')[0],
          email: email,
          role: role,
          status: "Active"
        };

        // Ensure user exists in live DB
        try {
          await PetCareDB.usersManager.ensureUserExists(userData);
        } catch (e) {
          console.error("Failed to ensure user in Firestore:", e);
        }

        // Ensure user is logged in
        localStorage.setItem("petcare_logged_in_user", JSON.stringify(userData));

        if (window.showToast) {
          window.showToast("Registration successful! Redirecting...", "success");
        } else {
          alert("Registration successful! Redirecting...");
        }

        setTimeout(() => {
          window.location.href = "user/dashboard.html";
        }, 1500);
      }

      registerForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const name = document.getElementById("regName").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const password = document.getElementById("regPassword").value;

        try {
          const userCredential = await createUserWithEmailAndPassword(auth, email, password);
          await handleSuccessfulRegistration(userCredential.user, name);
        } catch (err) {
          alert("Error during registration: " + err.message);
        }
      });

      // Google Sign Up
      const googleBtn = document.getElementById("googleLoginBtn");
      if (googleBtn) {
        googleBtn.addEventListener("click", async () => {
          try {
            const result = await signInWithPopup(auth, provider);
            await handleSuccessfulRegistration(result.user, result.user.displayName);
          } catch (error) {
            alert("Error with Google Sign-In: " + error.message);
          }
        });
      }
    });
  </script>
</body>

</html>

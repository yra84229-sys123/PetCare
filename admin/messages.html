<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Messages | Admin Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <meta name="view-transition" content="same-origin">
</head>
<body>

  <div class="dashboard-wrapper">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="../index.html" class="logo">
          <span class="logo-paw"><i class="fas fa-paw"></i></span> PawBuddy
        </a>
      </div>
      <ul class="sidebar-menu">
        <li>
          <a href="dashboard.html" class="sidebar-link">
            <i class="fas fa-chart-line"></i> Dashboard
          </a>
        </li>
        <li>
          <a href="pets.html" class="sidebar-link">
            <i class="fas fa-dog"></i> Manage Pets
          </a>
        </li>
        <li>
          <a href="owners.html" class="sidebar-link">
            <i class="fas fa-users"></i> Manage Owners
          </a>
        </li>
        <li>
          <a href="bookings.html" class="sidebar-link">
            <i class="fas fa-calendar-alt"></i> Manage Bookings
          </a>
        </li>
        <li>
          <a href="messages.html" class="sidebar-link active">
            <i class="fas fa-envelope"></i> View Messages
          </a>
        </li>
        <li>
          <a href="users.html" class="sidebar-link">
            <i class="fas fa-user-shield"></i> Manage Users
          </a>
        </li>
        <li style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
          <a href="../index.html" class="sidebar-link">
            <i class="fas fa-globe"></i> Back to Website
          </a>
        </li>
      </ul>
      <div class="sidebar-footer">
        <a href="#" class="sidebar-logout" onclick="PetCareDB.auth.logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </a>
      </div>
    </aside>

    <!-- Main Content Container -->
    <main class="main-content">
      <!-- Header -->
      <header class="dashboard-header">
        <div style="display: flex; align-items: center; gap: 12px;">
          <button class="btn-icon dashboard-hamburger" id="dashboardHamburger"><i class="fas fa-bars"></i></button>
          <div>
            <h1 style="font-size: 28px; font-weight: 800; color: var(--primary);">View Messages</h1>
            <p style="color: var(--text-muted); font-size: 14px;">Review inquiries and messages from users.</p>
          </div>
        </div>
      </header>

      <!-- Panel holding Table & Filter -->
      <section class="dashboard-panel">
        <div class="panel-header">
          <div class="action-bar">
            <!-- Search field -->
            <div class="search-bar">
              <i class="fas fa-search"></i>
              <input type="text" id="messagesSearchInput" class="form-control" placeholder="Search messages...">
            </div>
          </div>
        </div>

        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>Date & Time</th>
                <th>Sender ID</th>
                <th>Message Preview</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="messagesTableBody">
              <!-- Loaded dynamically by inline script -->
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- Message Detail Modal -->
  <div class="modal" id="messageModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="messageModalTitle">Message Details</h3>
        <button class="modal-close" id="btnCloseMessageModal">&times;</button>
      </div>
      <div class="modal-body">
        <p><strong>Date: </strong><span id="detailDate"></span></p>
        <p><strong>Sender ID: </strong><span id="detailSender"></span></p>
        <hr style="margin: 15px 0;">
        <p style="white-space: pre-wrap;" id="detailText"></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-outline" id="btnCancelMessage" style="padding: 8px 24px;">Close</button>
      </div>
    </div>
  </div>

  <!-- Script Modules -->
  <script src="../js/firebase.js"></script>
  <script src="../js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Ensure admin access
      if (!PetCareDB.auth.checkSession(["admin"])) return;

      const tableBody = document.getElementById("messagesTableBody");
      const searchInput = document.getElementById("messagesSearchInput");
      const modal = document.getElementById("messageModal");
      
      let allMessages = [];

      async function loadMessages() {
        try {
          allMessages = await PetCareDB.messages.getAll();
          allMessages.sort((a,b) => {
            const timeA = a.timestamp ? (typeof a.timestamp.toMillis === 'function' ? a.timestamp.toMillis() : new Date(a.timestamp).getTime()) : 0;
            const timeB = b.timestamp ? (typeof b.timestamp.toMillis === 'function' ? b.timestamp.toMillis() : new Date(b.timestamp).getTime()) : 0;
            return timeB - timeA;
          });
          renderMessages(allMessages);
        } catch (err) {
          alert(err.message);
        }
      }

      function renderMessages(messagesToRender) {
        tableBody.innerHTML = "";
        if (messagesToRender.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">No messages found.</td></tr>`;
          return;
        }

        messagesToRender.forEach(msg => {
          const dateObj = msg.timestamp ? (typeof msg.timestamp.toDate === 'function' ? msg.timestamp.toDate() : new Date(msg.timestamp)) : new Date();
          const date = dateObj.toLocaleString();
          const sender = msg.senderId || msg.localUserId || msg.firebaseUid || 'Anonymous';
          const preview = msg.text.length > 50 ? msg.text.substring(0, 50) + "..." : msg.text;
          
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${date}</td>
            <td><strong>${sender}</strong></td>
            <td>${preview}</td>
            <td class="table-actions">
              <button class="btn-icon view btn-view-msg" data-id="${msg.id}" title="View Details"><i class="fas fa-eye"></i></button>
              <button class="btn-icon delete btn-delete-msg" data-id="${msg.id}" title="Delete Message"><i class="fas fa-trash-alt"></i></button>
            </td>
          `;
          tableBody.appendChild(tr);
        });

        document.querySelectorAll(".btn-view-msg").forEach(btn => {
          btn.addEventListener("click", () => openMessageDetail(btn.dataset.id));
        });

        document.querySelectorAll(".btn-delete-msg").forEach(btn => {
          btn.addEventListener("click", () => deleteMessage(btn.dataset.id));
        });
      }

      function openMessageDetail(id) {
        const msg = allMessages.find(m => m.id === id);
        if(!msg) return;
        const dateObj = msg.timestamp ? (typeof msg.timestamp.toDate === 'function' ? msg.timestamp.toDate() : new Date(msg.timestamp)) : new Date();
        document.getElementById("detailDate").textContent = dateObj.toLocaleString();
        document.getElementById("detailSender").textContent = msg.senderId || msg.localUserId || msg.firebaseUid || 'Anonymous';
        document.getElementById("detailText").textContent = msg.text;
        modal.classList.add("active");
      }

      async function deleteMessage(id) {
        if(confirm("Are you sure you want to delete this message?")) {
          try {
            await PetCareDB.messages.delete(id);
            await loadMessages();
          } catch(err) {
            alert(err.message);
          }
        }
      }

      searchInput.addEventListener("input", (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = allMessages.filter(m => {
          const sender = m.senderId || m.localUserId || m.firebaseUid || 'Anonymous';
          return m.text.toLowerCase().includes(query) || sender.toLowerCase().includes(query);
        });
        renderMessages(filtered);
      });

      document.getElementById("btnCloseMessageModal").addEventListener("click", () => modal.classList.remove("active"));
      document.getElementById("btnCancelMessage").addEventListener("click", () => modal.classList.remove("active"));

      loadMessages();
    });
  </script>
</body>
</html>
